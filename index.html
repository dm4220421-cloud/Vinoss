<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>Venus 💖</title>
    <style>
        body { font-family: sans-serif; background-color: #fff0f3; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .card { background-color: white; padding: 40px; border-radius: 24px; text-align: center; width: 90%; max-width: 450px; border: 2px solid #ffccd5; }
        .btn { padding: 15px 30px; border: none; border-radius: 50px; cursor: pointer; font-weight: bold; background-color: #ff4d6d; color: white; font-size: 18px; margin-top: 20px; }
    </style>
</head>
<body>

    <audio id="mySong" loop src="https://files.catbox.moe/w8f553.mp3"></audio>

    <div class="card" id="mainCard">
        <div class="title">سڵاو ڤینۆس 💖</div>
        <h2>بۆ بیستنی ئەم گۆرانییە تایبەتە و بینینی نامەکە، تکایە کلیک لەسەر ئەم دوگمەیە بکە:</h2>
        <button class="btn" onclick="startExperience()">دەستپێکردن 🎶</button>
    </div>

    <script>
        function startExperience() {
            const music = document.getElementById('mySong');
            music.play();
            // لێرەدا دەچینە قۆناغی یەکەمی پرسیارەکان
            document.getElementById('mainCard').innerHTML = `
                <h2>دایم ئەمەوێ دەست پێشخەری بکەم هەواڵت بزانم بەڵام پاشت گەز ئەبمەوە. بۆچی؟ 🤔</h2>
                <button class="btn" onclick="alert('تەواوی پرسیارەکان لێرە بەردەوام دەبن...')">ئهمالم ئەکەی 😔</button>
            `;
        }
    </script>
</body>
</html>
